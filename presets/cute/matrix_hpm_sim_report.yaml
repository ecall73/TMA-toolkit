version: 2
name: cute_matrix_hpm_sim_report

analysis:
  parse:
    line_regex: '^\[PERF \]\[time=\s*(?P<time>\d+)\]\s+[^:]+:\s*(?P<name>MAT_SIM_[A-Za-z0-9_]+),\s*(?P<value>-?\d+)\s*$'
    use_last_occurrence: true
    keep_only_declared_direct_counters: true

  direct_counters:
    - MAT_SIM_TOTAL_CYC
    - MAT_SIM_CMD_ACCEPT
    - MAT_SIM_MMA_CMD_ACCEPT
    - MAT_SIM_MLS_CMD_ACCEPT
    - MAT_SIM_RELEASE_CMD_ACCEPT
    - MAT_SIM_LOAD_ISSUE
    - MAT_SIM_STORE_ISSUE
    - MAT_SIM_COMP_ISSUE
    - MAT_SIM_RELEASE_ISSUE
    - MAT_SIM_LOAD_DONE_A
    - MAT_SIM_LOAD_DONE_B
    - MAT_SIM_LOAD_DONE_C
    - MAT_SIM_LOAD_DONE_CMD
    - MAT_SIM_STORE_DONE
    - MAT_SIM_COMP_DONE
    - MAT_SIM_RELEASE_DONE
    - MAT_SIM_LOAD_INFLIGHT_CYC
    - MAT_SIM_STORE_INFLIGHT_CYC
    - MAT_SIM_COMP_INFLIGHT_CYC
    - MAT_SIM_RELEASE_WAIT_CYC
    - MAT_SIM_ACTIVE_CYC
    - MAT_SIM_OPS_Q
    - MAT_SIM_MEM_RD_BYTES_Q
    - MAT_SIM_MEM_WR_BYTES_Q

  summary_keys:
    - MAT_SIM_TOTAL_CYC
    - MAT_SIM_CMD_ACCEPT
    - MAT_SIM_MMA_CMD_ACCEPT
    - MAT_SIM_MLS_CMD_ACCEPT
    - MAT_SIM_RELEASE_CMD_ACCEPT
    - MAT_SIM_ACTIVE_RATIO
    - MAT_SIM_LOAD_ACTIVE_RATIO
    - MAT_SIM_STORE_ACTIVE_RATIO
    - MAT_SIM_COMP_ACTIVE_RATIO
    - MAT_SIM_RELEASE_ACTIVE_RATIO
    - MAT_SIM_LOAD_TOTAL_RATIO
    - MAT_SIM_STORE_TOTAL_RATIO
    - MAT_SIM_COMP_TOTAL_RATIO
    - MAT_SIM_RELEASE_TIME_RATIO
    - MAT_SIM_ACHIEVED_QOPS_PER_CYC
    - MAT_SIM_AVG_OPS_PER_CYC_EST
    - MAT_SIM_AVG_QOPS_PER_ACTIVE_CYC
    - MAT_SIM_AVG_OPS_PER_ACTIVE_CYC_EST
    - MAT_SIM_AVG_QOPS_PER_COMP_ACTIVE_CYC
    - MAT_SIM_AVG_OPS_PER_COMP_ACTIVE_CYC_EST
    - MAT_SIM_AVG_RD_QBYTES_PER_CYC
    - MAT_SIM_AVG_RD_BYTES_PER_CYC_EST
    - MAT_SIM_AVG_WR_QBYTES_PER_CYC
    - MAT_SIM_AVG_WR_BYTES_PER_CYC_EST
    - MAT_SIM_AVG_RD_QBYTES_PER_LOAD_ACTIVE_CYC
    - MAT_SIM_AVG_RD_BYTES_PER_LOAD_ACTIVE_CYC_EST
    - MAT_SIM_AVG_WR_QBYTES_PER_STORE_ACTIVE_CYC
    - MAT_SIM_AVG_WR_BYTES_PER_STORE_ACTIVE_CYC_EST
    - MAT_SIM_OI_Q
    - MAT_SIM_AVG_LOAD_LAT
    - MAT_SIM_AVG_STORE_LAT
    - MAT_SIM_AVG_COMP_LAT

  derived_counters:
    MAT_SIM_ISSUE_SUM: MAT_SIM_LOAD_ISSUE + MAT_SIM_STORE_ISSUE + MAT_SIM_COMP_ISSUE + MAT_SIM_RELEASE_ISSUE
    MAT_SIM_AVG_LOAD_LAT: MAT_SIM_LOAD_INFLIGHT_CYC / MAT_SIM_LOAD_DONE_CMD
    MAT_SIM_AVG_STORE_LAT: MAT_SIM_STORE_INFLIGHT_CYC / MAT_SIM_STORE_DONE
    MAT_SIM_AVG_COMP_LAT: MAT_SIM_COMP_INFLIGHT_CYC / MAT_SIM_COMP_DONE
    MAT_SIM_AVG_RELEASE_WAIT: MAT_SIM_RELEASE_WAIT_CYC / MAT_SIM_RELEASE_DONE
    MAT_SIM_ACTIVE_RATIO: MAT_SIM_ACTIVE_CYC / MAT_SIM_TOTAL_CYC
    MAT_SIM_LOAD_TOTAL_RATIO: MAT_SIM_LOAD_INFLIGHT_CYC / MAT_SIM_TOTAL_CYC
    MAT_SIM_STORE_TOTAL_RATIO: MAT_SIM_STORE_INFLIGHT_CYC / MAT_SIM_TOTAL_CYC
    MAT_SIM_COMP_TOTAL_RATIO: MAT_SIM_COMP_INFLIGHT_CYC / MAT_SIM_TOTAL_CYC
    MAT_SIM_RELEASE_TIME_RATIO: MAT_SIM_RELEASE_WAIT_CYC / MAT_SIM_TOTAL_CYC
    MAT_SIM_ACTIVE_WINDOW_BASE: MAT_SIM_ACTIVE_CYC / MAT_SIM_ACTIVE_CYC
    MAT_SIM_LOAD_ACTIVE_RATIO: MAT_SIM_LOAD_INFLIGHT_CYC / MAT_SIM_ACTIVE_CYC
    MAT_SIM_STORE_ACTIVE_RATIO: MAT_SIM_STORE_INFLIGHT_CYC / MAT_SIM_ACTIVE_CYC
    MAT_SIM_COMP_ACTIVE_RATIO: MAT_SIM_COMP_INFLIGHT_CYC / MAT_SIM_ACTIVE_CYC
    MAT_SIM_RELEASE_ACTIVE_RATIO: MAT_SIM_RELEASE_WAIT_CYC / MAT_SIM_ACTIVE_CYC
    MAT_SIM_CMD_TO_ISSUE_RATIO: MAT_SIM_ISSUE_SUM / MAT_SIM_CMD_ACCEPT
    MAT_SIM_COMP_PROGRESS_RATIO: MAT_SIM_COMP_DONE / MAT_SIM_COMP_ISSUE
    MAT_SIM_LOAD_PROGRESS_RATIO: MAT_SIM_LOAD_DONE_CMD / MAT_SIM_LOAD_ISSUE
    MAT_SIM_STORE_PROGRESS_RATIO: MAT_SIM_STORE_DONE / MAT_SIM_STORE_ISSUE
    MAT_SIM_ACHIEVED_QOPS_PER_CYC: MAT_SIM_OPS_Q / MAT_SIM_TOTAL_CYC
    MAT_SIM_AVG_OPS_PER_CYC_EST: MAT_SIM_ACHIEVED_QOPS_PER_CYC * 256
    MAT_SIM_AVG_QOPS_PER_ACTIVE_CYC: MAT_SIM_OPS_Q / MAT_SIM_ACTIVE_CYC
    MAT_SIM_AVG_OPS_PER_ACTIVE_CYC_EST: MAT_SIM_AVG_QOPS_PER_ACTIVE_CYC * 256
    MAT_SIM_AVG_QOPS_PER_COMP_ACTIVE_CYC: MAT_SIM_OPS_Q / MAT_SIM_COMP_INFLIGHT_CYC
    MAT_SIM_AVG_OPS_PER_COMP_ACTIVE_CYC_EST: MAT_SIM_AVG_QOPS_PER_COMP_ACTIVE_CYC * 256
    MAT_SIM_AVG_RD_QBYTES_PER_CYC: MAT_SIM_MEM_RD_BYTES_Q / MAT_SIM_TOTAL_CYC
    MAT_SIM_AVG_RD_BYTES_PER_CYC_EST: MAT_SIM_AVG_RD_QBYTES_PER_CYC * 256
    MAT_SIM_AVG_WR_QBYTES_PER_CYC: MAT_SIM_MEM_WR_BYTES_Q / MAT_SIM_TOTAL_CYC
    MAT_SIM_AVG_WR_BYTES_PER_CYC_EST: MAT_SIM_AVG_WR_QBYTES_PER_CYC * 256
    MAT_SIM_AVG_RD_QBYTES_PER_LOAD_ACTIVE_CYC: MAT_SIM_MEM_RD_BYTES_Q / MAT_SIM_LOAD_INFLIGHT_CYC
    MAT_SIM_AVG_RD_BYTES_PER_LOAD_ACTIVE_CYC_EST: MAT_SIM_AVG_RD_QBYTES_PER_LOAD_ACTIVE_CYC * 256
    MAT_SIM_AVG_WR_QBYTES_PER_STORE_ACTIVE_CYC: MAT_SIM_MEM_WR_BYTES_Q / MAT_SIM_STORE_INFLIGHT_CYC
    MAT_SIM_AVG_WR_BYTES_PER_STORE_ACTIVE_CYC_EST: MAT_SIM_AVG_WR_QBYTES_PER_STORE_ACTIVE_CYC * 256
    MAT_SIM_OI_Q: MAT_SIM_OPS_Q / (MAT_SIM_MEM_RD_BYTES_Q + MAT_SIM_MEM_WR_BYTES_Q)

  consistency_checks:
    - name: issue_sum_le_cmd_accept
      expr: MAT_SIM_ISSUE_SUM <= MAT_SIM_CMD_ACCEPT
      severity: error
    - name: load_done_le_issue
      expr: MAT_SIM_LOAD_DONE_CMD <= MAT_SIM_LOAD_ISSUE
      severity: error
    - name: store_done_le_issue
      expr: MAT_SIM_STORE_DONE <= MAT_SIM_STORE_ISSUE
      severity: error
    - name: comp_done_le_issue
      expr: MAT_SIM_COMP_DONE <= MAT_SIM_COMP_ISSUE
      severity: error
    - name: release_done_le_issue
      expr: MAT_SIM_RELEASE_DONE <= MAT_SIM_RELEASE_ISSUE
      severity: error
    - name: load_done_cmd_le_micro_sum
      expr: MAT_SIM_LOAD_DONE_CMD <= MAT_SIM_LOAD_DONE_A + MAT_SIM_LOAD_DONE_B + MAT_SIM_LOAD_DONE_C
      severity: error
    - name: active_le_total
      expr: MAT_SIM_ACTIVE_CYC <= MAT_SIM_TOTAL_CYC
      severity: error
    - name: release_done_eq_issue
      lhs: MAT_SIM_RELEASE_DONE
      rhs: MAT_SIM_RELEASE_ISSUE
      tolerance: 0.0
      severity: error

  hierarchy:
    - parent: MAT_SIM_TOTAL_CYC
      children:
        - MAT_SIM_LOAD_INFLIGHT_CYC
        - MAT_SIM_STORE_INFLIGHT_CYC
        - MAT_SIM_COMP_INFLIGHT_CYC
        - MAT_SIM_RELEASE_WAIT_CYC
        - MAT_SIM_ACTIVE_CYC
    - parent: MAT_SIM_CMD_ACCEPT
      children:
        - MAT_SIM_MMA_CMD_ACCEPT
        - MAT_SIM_MLS_CMD_ACCEPT
        - MAT_SIM_RELEASE_CMD_ACCEPT
    - parent: MAT_SIM_MLS_CMD_ACCEPT
      children:
        - MAT_SIM_LOAD_ISSUE
        - MAT_SIM_STORE_ISSUE

  chart_groups_abs:
    - name: CycleBreakdown
      ratio_parent: MAT_SIM_TOTAL_CYC
      counters:
        - MAT_SIM_LOAD_INFLIGHT_CYC
        - MAT_SIM_STORE_INFLIGHT_CYC
        - MAT_SIM_COMP_INFLIGHT_CYC
        - MAT_SIM_RELEASE_WAIT_CYC
        - MAT_SIM_ACTIVE_CYC
    - name: ActiveWindowUtilization
      ratio_parent: MAT_SIM_ACTIVE_WINDOW_BASE
      ratio_parent_map:
        MAT_SIM_LOAD_ACTIVE_RATIO: MAT_SIM_ACTIVE_WINDOW_BASE
        MAT_SIM_STORE_ACTIVE_RATIO: MAT_SIM_ACTIVE_WINDOW_BASE
        MAT_SIM_COMP_ACTIVE_RATIO: MAT_SIM_ACTIVE_WINDOW_BASE
        MAT_SIM_RELEASE_ACTIVE_RATIO: MAT_SIM_ACTIVE_WINDOW_BASE
      counters:
        - MAT_SIM_LOAD_ACTIVE_RATIO
        - MAT_SIM_STORE_ACTIVE_RATIO
        - MAT_SIM_COMP_ACTIVE_RATIO
        - MAT_SIM_RELEASE_ACTIVE_RATIO
    - name: TotalCycleShares
      counters:
        - MAT_SIM_ACTIVE_RATIO
        - MAT_SIM_LOAD_TOTAL_RATIO
        - MAT_SIM_STORE_TOTAL_RATIO
        - MAT_SIM_COMP_TOTAL_RATIO
        - MAT_SIM_RELEASE_TIME_RATIO
    - name: ThroughputAndLatency
      counters:
        - MAT_SIM_ACHIEVED_QOPS_PER_CYC
        - MAT_SIM_AVG_OPS_PER_CYC_EST
        - MAT_SIM_AVG_QOPS_PER_ACTIVE_CYC
        - MAT_SIM_AVG_OPS_PER_ACTIVE_CYC_EST
        - MAT_SIM_AVG_QOPS_PER_COMP_ACTIVE_CYC
        - MAT_SIM_AVG_OPS_PER_COMP_ACTIVE_CYC_EST
        - MAT_SIM_AVG_RD_QBYTES_PER_CYC
        - MAT_SIM_AVG_RD_BYTES_PER_CYC_EST
        - MAT_SIM_AVG_WR_QBYTES_PER_CYC
        - MAT_SIM_AVG_WR_BYTES_PER_CYC_EST
        - MAT_SIM_AVG_RD_QBYTES_PER_LOAD_ACTIVE_CYC
        - MAT_SIM_AVG_RD_BYTES_PER_LOAD_ACTIVE_CYC_EST
        - MAT_SIM_AVG_WR_QBYTES_PER_STORE_ACTIVE_CYC
        - MAT_SIM_AVG_WR_BYTES_PER_STORE_ACTIVE_CYC_EST
        - MAT_SIM_OI_Q
        - MAT_SIM_AVG_LOAD_LAT
        - MAT_SIM_AVG_STORE_LAT
        - MAT_SIM_AVG_COMP_LAT

  plot:
    title: XSAI Matrix HPM Sim Report
    baseline_counter: MAT_SIM_TOTAL_CYC
    baseline_label: Total Cycles

  display_aliases:
    MAT_SIM_LOAD_INFLIGHT_CYC: LoadInflightCyc
    MAT_SIM_STORE_INFLIGHT_CYC: StoreInflightCyc
    MAT_SIM_COMP_INFLIGHT_CYC: CompInflightCyc
    MAT_SIM_RELEASE_WAIT_CYC: ReleaseWaitCyc
    MAT_SIM_ACTIVE_CYC: ActiveCyc
    MAT_SIM_LOAD_ACTIVE_RATIO: LoadUtilInActive
    MAT_SIM_STORE_ACTIVE_RATIO: StoreUtilInActive
    MAT_SIM_COMP_ACTIVE_RATIO: CompUtilInActive
    MAT_SIM_RELEASE_ACTIVE_RATIO: ReleaseUtilInActive
    MAT_SIM_ACTIVE_RATIO: ActiveShareOfTotal
    MAT_SIM_LOAD_TOTAL_RATIO: LoadShareOfTotal
    MAT_SIM_STORE_TOTAL_RATIO: StoreShareOfTotal
    MAT_SIM_COMP_TOTAL_RATIO: CompShareOfTotal
    MAT_SIM_RELEASE_TIME_RATIO: ReleaseShareOfTotal
    MAT_SIM_ACHIEVED_QOPS_PER_CYC: AvgQOPSPerCycle
    MAT_SIM_AVG_OPS_PER_CYC_EST: AvgOpsPerCycle_EST
    MAT_SIM_AVG_QOPS_PER_ACTIVE_CYC: AvgQOPSPerActiveCycle
    MAT_SIM_AVG_OPS_PER_ACTIVE_CYC_EST: AvgOpsPerActiveCycle_EST
    MAT_SIM_AVG_QOPS_PER_COMP_ACTIVE_CYC: AvgQOPSPerCompActiveCycle
    MAT_SIM_AVG_OPS_PER_COMP_ACTIVE_CYC_EST: AvgOpsPerCompActiveCycle_EST
    MAT_SIM_AVG_RD_QBYTES_PER_CYC: AvgReadQBytesPerCycle
    MAT_SIM_AVG_RD_BYTES_PER_CYC_EST: AvgReadBytesPerCycle_EST
    MAT_SIM_AVG_WR_QBYTES_PER_CYC: AvgWriteQBytesPerCycle
    MAT_SIM_AVG_WR_BYTES_PER_CYC_EST: AvgWriteBytesPerCycle_EST
    MAT_SIM_AVG_RD_QBYTES_PER_LOAD_ACTIVE_CYC: AvgReadQBytesPerLoadActiveCycle
    MAT_SIM_AVG_RD_BYTES_PER_LOAD_ACTIVE_CYC_EST: AvgReadBytesPerLoadActiveCycle_EST
    MAT_SIM_AVG_WR_QBYTES_PER_STORE_ACTIVE_CYC: AvgWriteQBytesPerStoreActiveCycle
    MAT_SIM_AVG_WR_BYTES_PER_STORE_ACTIVE_CYC_EST: AvgWriteBytesPerStoreActiveCycle_EST
    MAT_SIM_AVG_LOAD_LAT: AvgLoadLat
    MAT_SIM_AVG_STORE_LAT: AvgStoreLat
    MAT_SIM_AVG_COMP_LAT: AvgCompLat
